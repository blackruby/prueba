<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fondo -->
  <rect width="512" height="512" rx="100" fill="#0f0f1a"/>

  <!-- Cuerpo de la jarra -->
  <rect x="130" y="140" width="210" height="230" rx="18" fill="#a89ef9"/>
  <!-- Asa -->
  <path d="M340 175 Q430 175 430 255 Q430 335 340 335" fill="none" stroke="#a89ef9" stroke-width="36" stroke-linecap="round"/>
  <!-- Espuma -->
  <ellipse cx="160" cy="140" rx="30" ry="22" fill="#e8e6ff"/>
  <ellipse cx="210" cy="128" rx="34" ry="24" fill="#e8e6ff"/>
  <ellipse cx="260" cy="124" rx="34" ry="24" fill="#e8e6ff"/>
  <ellipse cx="308" cy="130" rx="30" ry="22" fill="#e8e6ff"/>
  <ellipse cx="340" cy="142" rx="22" ry="18" fill="#e8e6ff"/>
  <!-- Relleno espuma (tapa la parte superior del cuerpo) -->
  <rect x="130" y="138" width="210" height="30" fill="#e8e6ff"/>
  <!-- Líquido (cerveza) más oscuro dentro -->
  <rect x="148" y="175" width="174" height="178" rx="6" fill="#7c6ef5" opacity="0.5"/>
  <!-- Burbujas -->
  <circle cx="190" cy="280" r="8" fill="#e8e6ff" opacity="0.5"/>
  <circle cx="230" cy="310" r="5" fill="#e8e6ff" opacity="0.4"/>
  <circle cx="270" cy="260" r="7" fill="#e8e6ff" opacity="0.45"/>
  <circle cx="305" cy="300" r="6" fill="#e8e6ff" opacity="0.4"/>
</svg>
